<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>AI Voice Interview Platform</title>
        <link rel="stylesheet" href="style3.css">
    </head>
    <body>
        <div class="container">
            <h1>
                AI Voice Interview Platform 
            </h1>
            <p>Practice Technical Interviews</p>
            <select id="role">
                <option value="frontend">Frontend Developer</option>
                <option value="Javascript">Javascript Developer</option>
                <option value="sde">Software Engineer</option>
             </select>
             <button id="button">Start Interview</button>
             <div class="question-card">
                <h2>Interview Question</h2>
                <p id="question">Click Start Interview</p>
             </div>
        </div>
        <div class="controls">
            <button id="speakbtn">Read Question</button>
            <button id="voicebtn">Start Answer</button>
        </div>
        <div class="timer-box">
            Time Left:
            <span id="timer">60</span>s
        </div>
        <div class="answer-box">
            <h3>Your Answer</h3>
            <p id="answer">Your answer will appear here</p>
        </div>
        <script src="js/questions.js"></script>
        <script src="js/app.js"></script>
    </body>
</html>
